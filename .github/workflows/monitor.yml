name: Monitor Services

on:
  schedule:
    - cron: "1-59/5 * * * *"
    - cron: "3-59/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    concurrency:
      group: monitor-services
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Decide whether monitoring should run
        id: freshness
        if: github.event_name == 'schedule'
        run: node scripts/should-run-monitor.mjs
        env:
          MONITOR_MIN_INTERVAL_MS: "240000"

      - name: Skip redundant scheduled check
        if: github.event_name == 'schedule' && steps.freshness.outputs.should_run != 'true'
        run: echo "Skipping scheduled check because recent monitoring data is still fresh."

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.freshness.outputs.should_run == 'true'
        run: npm ci

      - name: Refresh monitoring data
        if: github.event_name != 'schedule' || steps.freshness.outputs.should_run == 'true'
        run: npm run monitor
        env:
          STATUS_GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit updated monitoring data
        id: commit_monitoring
        if: github.event_name != 'schedule' || steps.freshness.outputs.should_run == 'true'
        run: |
          if git diff --quiet; then
            echo "No monitoring changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data
          git commit -m "chore(status): refresh monitoring data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: steps.commit_monitoring.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: gh workflow run "Deploy Status Site" --ref master

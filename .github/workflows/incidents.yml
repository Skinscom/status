name: Sync Incidents

on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: read

jobs:
  sync-incidents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync incidents snapshot
        run: npm run sync:incidents
        env:
          STATUS_GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit updated incident data
        id: commit_incidents
        run: |
          if git diff --quiet; then
            echo "No incident changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data
          git commit -m "chore(status): sync incident data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: steps.commit_incidents.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: gh workflow run "Deploy Status Site" --ref master
